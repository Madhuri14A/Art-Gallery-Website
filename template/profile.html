<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Art Gallery</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>Madhuri Amam</h1>
           <ul>
    <li><a href="/home">Home</a></li>
    <li><a href="/paintings">Gallery</a></li>
    
    {{if .LoggedIn}}
        <li><a href="/cart">Cart</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/my-orders">My Orders</a></li>
        <li><a href="/admin">Admin Panel</a></li>
        <li><a href="/logout">Logout</a></li>
    {{else}}
        <li><a href="/login">Login</a></li>
        <li><a href="/register">Register</a></li>
    {{end}}
</ul>
        </div>
    </nav>
    
    <div class="form-container card">
        <h2>Profile Settings</h2>
        
        {{if .Success}}
        <div style="background: #10b981; color: white; padding: 12px; border-radius: 6px; margin-bottom: 20px;">
            {{.Success}}
        </div>
        {{end}}
        
        <form method="POST" action="/profile">
            <div class="form-group">
                <label>Email</label>
                <input type="email" value="{{.User.Email}}" disabled 
                       style="background: #f5f5f5; cursor: not-allowed;">
                <small style="color: #64748b;">Email cannot be changed</small>
            </div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{.User.Name}}" 
                       placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" value="{{.User.Phone}}" 
                       placeholder="10-digit mobile number" 
                       pattern="[0-9]{10}" required>
            </div>
            
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" placeholder="House/Flat No, Street, Area" 
                          required>{{.User.Address}}</textarea>
            </div>
            
            <div class="form-group">
                <label>Pincode</label>
                <input type="text" name="pincode" value="{{.User.Pincode}}" 
                       placeholder="6-digit pincode" 
                       pattern="[0-9]{6}" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Art Gallery | Curated by uneven_flow</p>
        </div>
    </footer>
</body>
</html>
